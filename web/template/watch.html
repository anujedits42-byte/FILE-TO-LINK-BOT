<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>ANUJ KUMAR | {{ file_name }}</title>
  <link rel="icon" href="https://files.catbox.moe/b6vtfh.jpg" type="image/x-icon">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Fonts & Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
  <!-- Plyr & Bootstrap -->
  <link rel="stylesheet" href="https://cdn.plyr.io/3.6.12/plyr.css" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

  <style>
    :root {
      --primary-color: #00f0ff;
      --secondary-color: #7000ff;
      --bg-gradient: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      --glass-bg: rgba(255, 255, 255, 0.05);
      --glass-border: 1px solid rgba(255, 255, 255, 0.1);
      --card-radius: 16px;
    }

    body {
      background: var(--bg-gradient);
      color: #fff;
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #0f0c29; }
    ::-webkit-scrollbar-thumb {
      background: var(--secondary-color);
      border-radius: 4px;
    }

    .navbar {
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    /* Premium Navbar */
    .logo-img {
      height: 45px;
      border-radius: 10px;
      box-shadow: 0 0 10px #00f0ff;
      transition: 0.3s;
    }

    .logo-img:hover {
      transform: scale(1.08);
      box-shadow: 0 0 20px #00f0ff, 0 0 40px #7000ff;
    }

    .brand-text {
      font-size: 1.4rem;
      font-weight: 700;
      background: linear-gradient(45deg, #00f0ff, #7000ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 1px;
    }

    .brand-box {
      padding: 6px 14px;
      border-radius: 12px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
    }

    .player-wrapper {
      background: #000;
      border-radius: var(--card-radius);
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      margin-top: 20px;
      border: var(--glass-border);
    }

    .plyr--video .plyr__control--overlaid,
    .plyr--video .plyr__control:hover {
      background: var(--secondary-color);
    }

    .plyr--full-ui input[type=range] {
      color: var(--primary-color);
    }

    .btn-custom {
      border: none;
      border-radius: 12px;
      padding: 12px 20px;
      font-weight: 500;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      text-transform: uppercase;
      font-size: 0.9rem;
      letter-spacing: 0.5px;
    }

    .btn-custom:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
      filter: brightness(1.2);
    }

    .btn-mx { background: linear-gradient(45deg, #2980b9, #2c3e50); color: white; }
    .btn-vlc { background: linear-gradient(45deg, #e67e22, #d35400); color: white; }
    .btn-playit { background: linear-gradient(45deg, #8e44ad, #9b59b6); color: white; }

    .btn-download {
      background: linear-gradient(45deg, #00b09b, #96c93d);
      color: white;
      font-weight: 600;
      width: 100%;
    }

    .btn-telegram {
      background: linear-gradient(45deg, #0088cc, #36aee2);
      color: white;
      width: 100%;
    }

    .btn-share {
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #aaa;
      width: 100%;
    }

    .glass-card {
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      border: var(--glass-border);
      border-radius: var(--card-radius);
      padding: 20px;
      margin-bottom: 20px;
    }

    footer {
      margin-top: auto;
      background: rgba(0, 0, 0, 0.4);
      padding: 15px;
      text-align: center;
      font-size: 0.8rem;
      color: #666;
    }

    .watermark {
      position: fixed;
      bottom: 20px;
      right: 20px;
      opacity: 0.2;
      font-size: 3rem;
      font-weight: 800;
      transform: rotate(-15deg);
    }
  </style>
</head>

<body>

  <!-- Premium Navbar -->
  <nav class="navbar navbar-dark">
    <div class="container d-flex justify-content-center">
      <div class="d-flex align-items-center gap-3 brand-box">
        <img src="https://files.catbox.moe/b6vtfh.jpg" class="logo-img">
        <span class="brand-text">ANUJ KUMAR</span>
      </div>
    </div>
  </nav>

  <main class="container py-4">

    <div class="player-wrapper mb-4">
      <video id="myVideo" src="{{file_url}}" class="w-100" controls></video>
    </div>

    <div class="d-flex flex-wrap gap-2 mb-3">
      <a onclick="mx_player()" class="btn btn-custom btn-mx flex-fill">MX Player</a>
      <a onclick="vlc_player()" class="btn btn-custom btn-vlc flex-fill">VLC Player</a>
      <a onclick="playit_player()" class="btn btn-custom btn-playit flex-fill">PlayIt</a>
    </div>

    <div class="row g-3 mb-3">
      <div class="col-md-6">
        <a onclick="streamDownload()" class="btn btn-custom btn-download">Direct Download</a>
      </div>
      <div class="col-md-6">
        <a onclick="showLinkModal('{{tg_button}}')" class="btn btn-custom btn-telegram">Telegram</a>
      </div>
    </div>

  </main>

  <footer>
    <p>&copy; 2025 ANUJ KUMAR. All rights reserved.</p>
  </footer>

  <div class="watermark">ꜰɪʟᴇ_ᴛᴏ_ʟɪɴᴋ_ᴀᴋ_ʙᴏᴛ</div>

</body>
</html>
